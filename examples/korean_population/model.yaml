- name: what_is_the_trend_of_the_ratio_of_children_under
  question: What is the trend of the ratio of children under 5 to women aged 20-40 in '영등포구' over the past year?
  sql: "WITH __region_mois_population_age_under5_per_female_20to40_m_h AS (\n  SELECT\n    sgg,\n    yyyymmdd,\n    age_under5_per_female_20to40\n\
    \  FROM korean_population__apartment_market_price_data.hackathon_2025q2.region_mois_population_age_under5_per_female_20to40_m_h\n\
    )\nSELECT\n  DATE_TRUNC('MONTH', p.yyyymmdd) AS month,\n  SUM(p.age_under5_per_female_20to40) AS ratio_under5_per_female_20to40\n\
    FROM __region_mois_population_age_under5_per_female_20to40_m_h AS p\nWHERE\n  p.sgg = '영등포구'\n  AND p.yyyymmdd >= DATE_TRUNC('YEAR',\
    \ DATEADD(YEAR, -1, CURRENT_DATE))\n  AND p.yyyymmdd < DATE_TRUNC('YEAR', CURRENT_DATE)\nGROUP BY\n  DATE_TRUNC('MONTH',\
    \ p.yyyymmdd)\nORDER BY\n  month ASC\n -- Generated by Cortex Analyst (request_id: 89edffd7-f701-49e0-ac94-a77467158cf9)\n\
    ;"
  verified_at: 1775734635
  verified_by: weaver/v1.20260409_202511.iter1
