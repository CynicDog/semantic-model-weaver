- name: what_is_the_average_male_population_in_the_distr
  question: What is the average male population in the '중구' district for the year 2025?
  sql: "WITH __region_mois_population_gender_age_m_h AS (\n  SELECT\n    sgg,\n    yyyymmdd,\n    male\n  FROM korean_population__apartment_market_price_data.hackathon_2025q2.region_mois_population_gender_age_m_h\n\
    ), __region_mois_population_gender_age_m_h AS (\n  SELECT\n    sgg,\n    yyyymmdd,\n    male\n  FROM __region_mois_population_gender_age_m_h\n\
    )\nSELECT\n  AVG(monthly_male) AS avg_male_population\nFROM (\n  SELECT\n    DATE_TRUNC('MONTH', p.yyyymmdd) AS month,\n\
    \    SUM(p.male) AS monthly_male\n  FROM __region_mois_population_gender_age_m_h AS p\n  WHERE\n    p.sgg = '중구' AND DATE_PART('YEAR',\
    \ p.yyyymmdd) = 2025\n  GROUP BY\n    DATE_TRUNC('MONTH', p.yyyymmdd)\n) AS monthly_data\n -- Generated by Cortex Analyst\
    \ (request_id: 009ea793-f863-4c45-a912-9e412448b669)\n;"
