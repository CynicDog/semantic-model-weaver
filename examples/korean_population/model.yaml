verified_queries:
- name: how_many_people_are_over_70_years_old_in_the_dis
  question: How many people are over 70 years old in the '영등포구' district as of the latest date?
  sql: "WITH __region_mois_population_gender_age_m_h AS (\n  SELECT\n    sgg,\n    yyyymmdd,\n    age_over70\n  FROM korean_population__apartment_market_price_data.hackathon_2025q2.region_mois_population_gender_age_m_h\n\
    )\nSELECT\n  p.yyyymmdd,\n  SUM(p.age_over70) AS total_age_over70\nFROM __region_mois_population_gender_age_m_h AS p\n\
    WHERE\n  p.sgg = '영등포구'\n  AND p.yyyymmdd = (\n    SELECT\n      MAX(yyyymmdd)\n    FROM __region_mois_population_gender_age_m_h\n\
    \    WHERE\n      sgg = '영등포구'\n  )\nGROUP BY\n  p.yyyymmdd\n -- Generated by Cortex Analyst (request_id: bab62c15-4ac9-4983-81d8-96fa7ffe4e60)\n\
    ;"
  verified_at: 1775734635
  verified_by: weaver/v1.20260409_202511.iter1
- name: how_many_total_households_are_there_in_each_sgg
  question: How many total households are there in each SGG (시군구명) as of the latest date in the data?
  sql: "WITH __region_apt_richgo_market_price_m_h AS (\n  SELECT\n    sgg,\n    yyyymmdd,\n    total_households\n  FROM korean_population__apartment_market_price_data.hackathon_2025q2.region_apt_richgo_market_price_m_h\n\
    )\nSELECT\n  a.sgg,\n  SUM(a.total_households) AS total_households\nFROM __region_apt_richgo_market_price_m_h AS a\nWHERE\n\
    \  a.yyyymmdd = (\n    SELECT\n      MAX(yyyymmdd)\n    FROM __region_apt_richgo_market_price_m_h\n  )\nGROUP BY\n  a.sgg\n\
    ORDER BY\n  total_households DESC NULLS LAST\n -- Generated by Cortex Analyst (request_id: fcf5eafc-0f1f-4af2-b907-d1989b628b91)\n\
    ;"
  verified_at: 1775734635
  verified_by: weaver/v1.20260409_202511.iter1
- name: what_is_the_average_jeonse_price_per_supply_pyeo
  question: What is the average JEONSE_PRICE_PER_SUPPLY_PYEONG in each SGG (시군구명) for the latest date?
  sql: "WITH __region_apt_richgo_market_price_m_h AS (\n  SELECT\n    sgg,\n    yyyymmdd,\n    jeonse_price_per_supply_pyeong\n\
    \  FROM korean_population__apartment_market_price_data.hackathon_2025q2.region_apt_richgo_market_price_m_h\n)\nSELECT\n\
    \  m.sgg,\n  AVG(m.jeonse_price_per_supply_pyeong) AS avg_jeonse_price_per_supply_pyeong\nFROM __region_apt_richgo_market_price_m_h\
    \ AS m\nWHERE\n  m.yyyymmdd = (\n    SELECT\n      MAX(yyyymmdd)\n    FROM __region_apt_richgo_market_price_m_h\n  )\n\
    GROUP BY\n  m.sgg\nORDER BY\n  avg_jeonse_price_per_supply_pyeong DESC NULLS LAST\n -- Generated by Cortex Analyst (request_id:\
    \ 4eb9d696-cb19-48f1-aa93-65c7ab59ce0d)\n;"
  verified_at: 1775734635
  verified_by: weaver/v1.20260409_202511.iter1
- name: what_is_the_average_ratio_of_children_under_5_to
  question: What is the average ratio of children under 5 to women aged 20-40 in Seoul as of the latest date?
  sql: "WITH __region_mois_population_age_under5_per_female_20to40_m_h AS (\n  SELECT\n    sd,\n    yyyymmdd,\n    age_under5_per_female_20to40\n\
    \  FROM korean_population__apartment_market_price_data.hackathon_2025q2.region_mois_population_age_under5_per_female_20to40_m_h\n\
    )\nSELECT\n  sd,\n  yyyymmdd,\n  AVG(age_under5_per_female_20to40) AS avg_ratio_under5_per_female_20to40\nFROM __region_mois_population_age_under5_per_female_20to40_m_h\n\
    WHERE\n  sd = '서울'\n  AND yyyymmdd = (\n    SELECT\n      MAX(yyyymmdd)\n    FROM __region_mois_population_age_under5_per_female_20to40_m_h\n\
    \    WHERE\n      sd = '서울'\n  )\nGROUP BY\n  sd,\n  yyyymmdd\n -- Generated by Cortex Analyst (request_id: 1c920665-9533-45c2-abff-040cf90832a1)\n\
    ;"
  verified_at: 1775734635
  verified_by: weaver/v1.20260409_202511.iter1
- name: what_is_the_correlation_between_the_ratio_of_chi
  question: What is the correlation between the ratio of children under 5 to women aged 20-40 and the average apartment price
    per supply pyeong in '서초구' as of the latest date?
  sql: "WITH __region_apt_richgo_market_price_m_h AS (\n  SELECT\n    region_level,\n    bjd_code,\n    sgg,\n    emd,\n \
    \   yyyymmdd,\n    meme_price_per_supply_pyeong\n  FROM korean_population__apartment_market_price_data.hackathon_2025q2.region_apt_richgo_market_price_m_h\n\
    ), __region_mois_population_age_under5_per_female_20to40_m_h AS (\n  SELECT\n    region_level,\n    bjd_code,\n    sgg,\n\
    \    emd,\n    yyyymmdd,\n    age_under5_per_female_20to40\n  FROM korean_population__apartment_market_price_data.hackathon_2025q2.region_mois_population_age_under5_per_female_20to40_m_h\n\
    ), latest_date AS (\n  SELECT\n    MAX(yyyymmdd) AS max_date\n  FROM __region_apt_richgo_market_price_m_h\n  WHERE\n \
    \   sgg = '서초구'\n), joined AS (\n  SELECT\n    m.emd,\n    m.yyyymmdd,\n    SUM(m.meme_price_per_supply_pyeong) AS total_meme_price,\n\
    \    ANY_VALUE(p.age_under5_per_female_20to40) AS ratio_under5_per_female\n  FROM __region_apt_richgo_market_price_m_h\
    \ AS m\n  LEFT OUTER JOIN __region_mois_population_age_under5_per_female_20to40_m_h AS p\n    ON m.region_level = p.region_level\n\
    \    AND m.bjd_code = p.bjd_code\n    AND m.sgg = p.sgg\n    AND m.emd = p.emd\n    AND m.yyyymmdd = p.yyyymmdd\n  WHERE\n\
    \    m.sgg = '서초구' AND m.yyyymmdd = (\n      SELECT\n        max_date\n      FROM latest_date\n    )\n  GROUP BY\n   \
    \ m.emd,\n    m.yyyymmdd\n)\nSELECT\n  CORR(ratio_under5_per_female, total_meme_price) AS correlation_ratio_vs_price,\n\
    \  MIN(yyyymmdd) AS data_date\nFROM joined\n -- Generated by Cortex Analyst (request_id: e4f274ae-729e-4de9-adac-a14d5967e804)\n\
    ;"
