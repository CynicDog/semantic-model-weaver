    )\nSELECT\n  p.emd,\n  p.sgg,\n  p.sd,\n  p.yyyymmdd,\n  SUM(p.age_under5) AS total_age_under5,\n  SUM(p.female_20to40)\
    \ AS total_female_20to40,\n  SUM(p.age_under5) / NULLIF(NULLIF(SUM(p.female_20to40), 0), 0) AS ratio_under5_to_female_20to40\n\
