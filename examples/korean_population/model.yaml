- name: what_is_the_total_number_of_households_in_each_s
  question: What is the total number of households in each SD (시도명) for the year 2025?
  sql: "WITH __region_apt_richgo_market_price_m_h AS (\n  SELECT\n    sd,\n    yyyymmdd,\n    total_households\n  FROM korean_population__apartment_market_price_data.hackathon_2025q2.region_apt_richgo_market_price_m_h\n\
    ), market_price AS (\n  SELECT\n    sd,\n    yyyymmdd,\n    total_households\n  FROM __region_apt_richgo_market_price_m_h\n\
    )\nSELECT\n  a.sd,\n  SUM(a.total_households) AS total_households\nFROM market_price AS a\nWHERE\n  DATE_PART('YEAR',\
