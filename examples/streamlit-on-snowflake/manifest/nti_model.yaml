        synonyms: [매도 8잔량, ask8 qty]
      - name: BID_QUANTITY_L8
        expr: SUM(BID_STEP8_BSOD_RQTY)
        data_type: NUMBER
        description: Remaining quantity at bid level 8.
        synonyms: [매수 8잔량, bid8 qty]
      # Level 9
      - name: ASK_PRICE_L9
        expr: AVG(ASK_STEP9_BSOD_PRC)
