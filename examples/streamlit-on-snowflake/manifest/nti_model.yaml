name: next_trading_intelligence
description: >
  Next Trading Intelligence — KRX equity market semantic model.
  Covers KOSPI and KOSDAQ tick executions, 10-level order book depth,
  program trading flows by stock and investor type, market breadth statistics,
  closing auction data, and stock reference metadata.
  All data sourced from Nextrade via Snowflake Marketplace.
  Date range: 2025-12-15 to 2026-01-23.

tables:

  # ---------------------------------------------------------------------------
  # Stock Reference  (NX_HT_BAT_REFER_A0)
  # ---------------------------------------------------------------------------
  - name: STOCK_REFERENCE
    description: >
      Stock master reference table. One row per stock per DW date (daily batch).
      Contains full identifiers, names, industry classification, all trading
      restriction flags (halt, alert, warning, short-sell, managed issue, etc.),
      price limits, listed share count, par/issue price, and clearing metadata.
    base_table:
      database: NEXTRADE_EQUITY_MARKET_DATA
      schema: FIN
      table: NX_HT_BAT_REFER_A0

    time_dimensions:
      - name: DW_DATE
        expr: DWDD
        data_type: DATE
        description: DW (data warehouse) batch date for this reference snapshot.
        synonyms: [날짜, date, 기준일, as-of date]

    dimensions:
      - name: STOCK_CODE
        expr: ISU_CD
        data_type: VARCHAR
        description: Full 12-character issue code (KRX standard). Primary key for joins.
        synonyms: [종목코드, ticker, issue code, symbol, 종목]
      - name: SHORT_CODE
        expr: ISU_SRT_CD
        data_type: VARCHAR
        description: Shortened 6-character stock code (e.g. 005930 for Samsung Electronics).
        synonyms: [단축코드, short ticker, 6자리코드]
      - name: STOCK_NAME_KR
        expr: ISU_ABWD_NM
        data_type: VARCHAR
        description: Abbreviated Korean stock name (e.g. 삼성전자).
        synonyms: [종목명, 주식명, 회사명, 기업명, stock name, company name, name]
      - name: STOCK_NAME_EN
        expr: ISU_ENAW_NM
        data_type: VARCHAR
        description: Abbreviated English stock name.
        synonyms: [영문명, english name, english ticker]
      - name: MARKET_ID
        expr: MKT_ID
        data_type: VARCHAR
        sample_values: [STK, KSQ]
        description: Market identifier. STK=KOSPI, KSQ=KOSDAQ.
        synonyms: [시장, market, 코스피, 코스닥, exchange, 거래소]
      - name: SECURITY_GROUP
        expr: SECU_GRP_ID
        data_type: VARCHAR
        sample_values: [ST, DR, MF, IF, FS, RT]
        description: >
          Security group type. ST=Stock, DR=Depositary Receipt, MF=Fund,
          IF=ETF, FS=Futures/Structured, RT=REIT.
        synonyms: [증권 유형, security type, asset type, 자산 유형]
      - name: INFO_DIST_GROUP
        expr: INFO_DSTB_GRP_NO
        data_type: VARCHAR
        description: Information distribution group number — KRX internal broadcast grouping.
        synonyms: [정보 배포 그룹]
      - name: MARKET_OP_PRODUCT_GROUP
        expr: MKOP_PROD_GRP_ID
        data_type: VARCHAR
        description: Market operation product group ID — classifies product families for circuit breaker and operation rules.
        synonyms: [시장 운영 상품 그룹]
      - name: OFFER_TYPE
        expr: OFF_TP_CD
        data_type: VARCHAR
        description: Offer type code — indicates how the security is offered (public, rights, etc.).
        synonyms: [공모 유형, offer type]
      - name: PAR_PRICE_CHANGE_TYPE
        expr: PAPR_CHG_TP_CD
        data_type: VARCHAR
        description: Par price (액면가) change type code.
        synonyms: [액면가 변경 유형]
      - name: OPEN_BASE_PRICE_ISSUE
        expr: OPBA_PRC_ISU_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Flag indicating if base price is set via open-market determination rather than prior close.
        synonyms: [공모 기준가 종목, open base price issue]
      - name: REVALUATION_REASON
        expr: RVAL_ISU_RSN_CD
        data_type: VARCHAR
        description: Reason code for base price revaluation (e.g. rights offering, split, merger).
        synonyms: [재평가 사유, revaluation reason]
      - name: BASE_PRICE_CHANGE_ISSUE
        expr: BASE_PRC_CHG_ISU_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Flag set when the base price was changed for today's session.
        synonyms: [기준가 변경 종목, base price changed]
      - name: REDEMPTION_CONDITION
        expr: RDEN_TG_COND_CD
        data_type: VARCHAR
        description: Redemption target condition code — used for structured products and redeemable securities.
        synonyms: [상환 조건, redemption condition]
      - name: MARKET_ALERT_RISK_ADVISORY
        expr: MKT_ALRT_RISK_ADNT_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Market alert risk advisory flag. Y=risk advisory notice issued.
        synonyms: [시장경보 위험 안내, risk advisory, alert advisory]
      - name: MARKET_ALERT_TYPE
        expr: MKT_ALRT_TP_CD
        data_type: VARCHAR
        description: Market alert type code — level of regulatory alert (caution, warning, danger).
        synonyms: [시장경보 유형, alert type, 경보 단계]
      - name: GOVERNANCE_EXCLUSION
        expr: GVNC_EXLC_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Governance exclusion flag. Y=excluded from governance-based index baskets.
        synonyms: [지배구조 배제, governance exclusion]
      - name: MANAGED_ISSUE
        expr: AMIS_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Managed issue (관리종목) flag. Y=under KRX administrative watchlist.
        synonyms: [관리종목, managed, watchlist, administrative issue]
      - name: UNFAITHFUL_DISCLOSURE
        expr: UFDC_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Unfaithful disclosure (불성실공시) flag. Y=flagged for inadequate disclosure.
        synonyms: [불성실공시, disclosure violation, unfaithful]
      - name: BLACKLIST
        expr: BKLS_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Blacklist flag. Y=on KRX blacklist (typically for repeated violations).
        synonyms: [블랙리스트, blacklist]
      - name: TRADING_HALT
        expr: TDHL_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Trading halt flag. Y=currently halted; no orders accepted.
        synonyms: [거래정지, halt, suspended, trading stopped]
      - name: INDUSTRY_ID
        expr: IND_ID
        data_type: VARCHAR
        description: KRX industry classification code (업종코드).
        synonyms: [업종, industry, sector, 업종코드, industry code]
      - name: SIZE_SEGMENT
        expr: SMSC_YN
        data_type: VARCHAR
        description: Size segment flag — distinguishes small/mid cap (SMSC) from large cap.
        synonyms: [중소형주, small mid cap, size segment]
      - name: BOARD_SECTION
        expr: BSEC_TP_CD
        data_type: VARCHAR
        description: Board section type code — main board vs special board (e.g. KONEX, venture).
        synonyms: [보드, board type, 구분]
      - name: INVESTMENT_OBJECTIVE_GROUP
        expr: IVOG_TP_CD
        data_type: VARCHAR
        description: Investment objective group type code.
        synonyms: [투자 목적 그룹]
      - name: KRX_PREV_CHANGE_TYPE
        expr: KRX_PRDY_CSPR_TP_CD
        data_type: VARCHAR
        description: KRX-sourced price change direction type vs previous day (up/down/unchanged).
        synonyms: [KRX 전일 대비 구분, price direction, 등락 구분]
      - name: LISTING_DATE
        expr: LIST_DD
        data_type: VARCHAR
        description: Listing date as YYYYMMDD string. Date the stock began trading on KRX.
        synonyms: [상장일, listed date, IPO date, 주식 상장일]
      - name: ARBITRAGE_TRADING
        expr: ARTR_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Arbitrary/auction trading eligible flag.
        synonyms: [경쟁매매, arbitrage trading eligible]
      - name: EXERCISE_START_DATE
        expr: EXIE_STRT_DD
        data_type: VARCHAR
        description: Exercise or expiry window start date (YYYYMMDD) — relevant for warrants and structured products.
        synonyms: [행사 시작일, exercise start, expiry start]
      - name: EXERCISE_END_DATE
        expr: EXIE_END_DD
        data_type: VARCHAR
        description: Exercise or expiry window end date (YYYYMMDD).
        synonyms: [행사 종료일, exercise end, expiry end]
      - name: CREDIT_ORDER_POSSIBLE
        expr: CRDT_ODPS_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Credit order (신용거래) eligible flag. Y=margin/credit buying allowed.
        synonyms: [신용거래 가능, credit trading, margin eligible]
      - name: CPIC_TYPE
        expr: CPIC_TP_CD
        data_type: VARCHAR
        description: Clearing participant/CPIC type code — classifies clearing pathway.
        synonyms: [청산 참여자 유형, clearing type]
      - name: NEW_STOCK
        expr: NTST_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: New stock flag. Y=stock is newly listed (신규상장).
        synonyms: [신규상장, new listing, newly listed, IPO]
      - name: REITS_KIND
        expr: REITS_KIND_CD
        data_type: VARCHAR
        description: REIT kind code — subclassification for real estate investment trusts.
        synonyms: [리츠 종류, REIT type]
      - name: TARGET_ISSUE_CODE
        expr: TGST_ISU_CD
        data_type: VARCHAR
        description: Target issue code — reference to an underlying or paired issue (e.g. for warrants or ETF).
        synonyms: [대상 종목코드, underlying, target issue]
      - name: CURRENCY
        expr: CURR_ISO_CD
        data_type: VARCHAR
        sample_values: [KRW, USD]
        description: ISO currency code for the issue price and trading denomination.
        synonyms: [통화, currency, 거래 통화]
      - name: NATION_CODE
        expr: NT_CD
        data_type: VARCHAR
        description: Nation code for the issuer's home country (ISO-3).
        synonyms: [국가 코드, country, nation]
      - name: MARKET_MAKER_PROHIBITED
        expr: MKMK_PSBT_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Market maker order prohibition flag. Y=no market maker activity allowed.
        synonyms: [유동성공급자 호가 금지, market maker prohibition]
      - name: SHORT_SELL_ALLOWED
        expr: SHSL_PSBT_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Short selling allowed flag. Y=short selling permitted for this stock.
        synonyms: [공매도, short sell, short selling, 공매도 가능]
      - name: REGULATION_FLAG
        expr: REGS_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Regulatory restriction flag (e.g. threshold securities, restricted shares).
        synonyms: [규제 대상, regulation flag, restricted]
      - name: SPAC
        expr: SPAC_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: SPAC (Special Purpose Acquisition Company) flag.
        synonyms: [SPAC, 스팩, blank check company]
      - name: INVESTMENT_CAUTION_REMEDY
        expr: IVCT_RMID_ISU_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Investment caution/remedy (투자유의/개선) issue flag.
        synonyms: [투자유의, 투자개선, caution issue, remedy issue]
      - name: OVERHEAT_TYPE
        expr: STRM_OVHT_ISU_TP_CD
        data_type: VARCHAR
        description: Sudden/stream overheat issue type code — triggered on extreme intraday volatility.
        synonyms: [과열 종목 유형, overheat, 급등락 유형]
      - name: LISTING_BROKER
        expr: LSBR_MBR_NO
        data_type: VARCHAR
        description: Listing broker member number — KRX member firm that underwrote/listed the stock.
        synonyms: [상장 주관사, listing broker, underwriter]
      - name: LP_ORDER_POSSIBLE
        expr: LP_ODPS_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Liquidity provider (LP) order submission possible flag.
        synonyms: [유동성공급자 호가 가능, LP eligible]
      - name: LOW_LIQUIDITY
        expr: LWLQ_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Low liquidity issue flag. Y=flagged as a low-liquidity stock.
        synonyms: [저유동성, low liquidity, illiquid]
      - name: ABNORMAL_SURGE
        expr: ANSG_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Abnormal surge (이상 급등) flag. Y=unusual price or volume spike detected.
        synonyms: [이상 급등, 이상 급등락, surge, anomaly, 이상 징후]
      - name: INVESTMENT_WARNING
        expr: IVWR_ISU_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Investment warning (투자경고) flag. Y=formal warning issued by KRX.
        synonyms: [투자경고, investment warning, 경고 종목]
      - name: LISTED_SHARES_LOCKED
        expr: LSST_CT_LCK_ISU_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Listed shares count locked flag. Y=share count under legal lock-up.
        synonyms: [상장주식수 잠금, shares locked]
      - name: SPAC_DISAPPROVAL_MERGE
        expr: SPAC_DAPP_MRGE_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: SPAC merger disapproval flag. Y=SPAC merger was rejected by shareholder vote.
        synonyms: [스팩 합병 부결, SPAC merger rejection]
      - name: SEGMENT_TYPE
        expr: SGMT_TP_CD
        data_type: VARCHAR
        description: Market segment type code — further subdivision within a market (e.g. growth segment).
        synonyms: [세그먼트, segment, 시장 구분]
      - name: COMPUTER_TRADING_CHECK
        expr: CPTR_TRD_CHIC_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Computer (algorithmic) trading check flag — under surveillance.
        synonyms: [컴퓨터 매매 점검, algo check, algorithmic trading check]
      - name: COMPUTER_TRADING_VOLUME_LIMIT
        expr: CPTR_TRDVL_LMT_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Computer trading volume limit applied flag.
        synonyms: [컴퓨터 매매량 제한, algo volume limit]
      - name: COMPUTER_TRADING_IMPOSSIBILITY
        expr: CPTR_TRD_IPSB_RSN_OCCR_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Flag indicating an impossibility reason has occurred for computer trading.
        synonyms: [컴퓨터 매매 불가 사유, algo trading blocked]
      - name: COMPUTER_TRADING_PROHIBITED
        expr: CPTR_TRD_PSBT_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Computer (algorithmic) trading prohibited flag. Y=algo orders rejected.
        synonyms: [컴퓨터 매매 금지, algo prohibited]
      - name: NEGOTIATED_TRADING_PROHIBITED
        expr: NGTR_TRD_PSBT_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Negotiated (block) trading prohibited flag.
        synonyms: [협의 매매 금지, negotiated trading, block trade prohibited]
      - name: NEXT_DAY_CHANGE_TYPE
        expr: NXT_PRDY_CSPR_TP_CD
        data_type: VARCHAR
        description: Next trading day price change direction type code (pre-computed).
        synonyms: [익일 등락 구분, next day direction]
      - name: PRE_MARKET_NEGOTIATED_PROHIBITED
        expr: MAMKT_BF_NGTR_PSBT_YN
        data_type: VARCHAR
        sample_values: ['Y', 'N']
        description: Main market before-session negotiated trading prohibited flag.
        synonyms: [장전 협의 매매 금지, pre-market block trade prohibited]

    measures:
      - name: BASE_PRICE
        expr: AVG(BASE_PRC)
        data_type: NUMBER
        description: Base price (기준가격) — prior day close used for ±30% daily limit calculation.
        synonyms: [기준가, base price, 전일 종가 기준]
      - name: KRX_PREV_CHANGE
        expr: AVG(KRX_PRDY_CSPR)
        data_type: NUMBER
        description: KRX-sourced price change amount vs previous day close (KRW).
        synonyms: [KRX 전일 대비, prev day change amount]
      - name: PREV_VOLUME
        expr: SUM(PRDY_ACC_TRD_QTY)
        data_type: NUMBER
        description: Previous trading day accumulated trading volume (shares).
        synonyms: [전일 거래량, prior volume, previous volume]
      - name: PREV_TRADE_VALUE
        expr: SUM(PRDY_ACC_TRVAL)
        data_type: NUMBER
        description: Previous trading day accumulated trading value (KRW).
        synonyms: [전일 거래대금, prior trade value, previous turnover]
      - name: UPPER_LIMIT_PRICE
        expr: AVG(ULPR)
        data_type: NUMBER
        description: Upper limit price (상한가) — base price +30%. Orders above this are rejected.
        synonyms: [상한가, upper limit, price ceiling, limit up price]
      - name: LOWER_LIMIT_PRICE
        expr: AVG(LWLP)
        data_type: NUMBER
        description: Lower limit price (하한가) — base price -30%. Orders below this are rejected.
        synonyms: [하한가, lower limit, price floor, limit down price]
      - name: PAR_PRICE
        expr: AVG(PAPR)
        data_type: NUMBER
        description: Par (face) value per share (액면가) in KRW.
        synonyms: [액면가, par value, face value]
      - name: ISSUE_PRICE
        expr: AVG(ISSU_PRC)
        data_type: NUMBER
        description: IPO or rights offering issue price (KRW).
        synonyms: [발행가, issue price, IPO price, 공모가]
      - name: LISTED_SHARES
        expr: AVG(LSST_CT)
        data_type: NUMBER
        description: Number of listed (issued) shares outstanding.
        synonyms: [상장주식수, shares outstanding, float, issued shares]
      - name: CAPITAL_AMOUNT
        expr: AVG(CAPT_AMT)
        data_type: NUMBER
        description: Total capital amount (자본금) = par price × listed shares, in KRW.
        synonyms: [자본금, capital, paid-in capital]
      - name: VALUATION_PRICE
        expr: AVG(VALU_PRC)
        data_type: NUMBER
        description: Theoretical / fair-value price (이론가) computed by KRX for structured products.
        synonyms: [이론가, theoretical price, valuation price, fair value]
      - name: LOWEST_ORDER_PRICE
        expr: AVG(LWST_OD_PRC)
        data_type: NUMBER
        description: Lowest permissible order price for this issue (tick-adjusted floor).
        synonyms: [최저 호가, lowest order price, minimum order price]
      - name: HIGHEST_ORDER_PRICE
        expr: AVG(HGST_OD_PRC)
        data_type: NUMBER
        description: Highest permissible order price for this issue (tick-adjusted ceiling).
        synonyms: [최고 호가, highest order price, maximum order price]
      - name: NEXT_DAY_CHANGE
        expr: AVG(NXT_PRDY_CSPR)
        data_type: NUMBER
        description: Pre-computed next trading day expected price change amount (KRW).
        synonyms: [익일 예상 변동, next day change]
      - name: COMPUTER_TRADING_PERMISSION_CODE
        expr: AVG(CPTR_TRD_PMSN_CD)
        data_type: NUMBER
        description: Computer trading permission code — numeric level of algo trading access.
        synonyms: [컴퓨터 매매 허용 코드, algo permission]


  # ---------------------------------------------------------------------------
  # Trade Executions  (NX_HT_ONL_MKTPR_A3)
  # ---------------------------------------------------------------------------
  - name: TRADE_EXECUTIONS
    description: >
      Tick-level trade execution records. Each row is a single matched trade on KRX.
      Contains execution price, quantity, running OHLC, accumulated volume/value,
      best ask/bid snapshot at time of execution, and LP holding quantity.
      95.7M rows covering KOSPI and KOSDAQ from 2025-12-15 to 2026-01-23.
    base_table:
      database: NEXTRADE_EQUITY_MARKET_DATA
      schema: FIN
      table: NX_HT_ONL_MKTPR_A3

    time_dimensions:
      - name: DW_DATE
        expr: DWDD
        data_type: DATE
        description: Trading date for this execution record.
        synonyms: [날짜, date, 거래일, trading date]

    dimensions:
      - name: MARKET_ID
        expr: MKT_ID
        data_type: VARCHAR
        sample_values: [STK, KSQ]
        description: Market identifier. STK=KOSPI, KSQ=KOSDAQ.
        synonyms: [시장, market, 코스피, 코스닥, exchange]
      - name: BOARD_ID
        expr: BRD_ID
        data_type: VARCHAR
        description: Board ID within the market (e.g. regular board, odd-lot board).
        synonyms: [보드, board]
      - name: STOCK_CODE
        expr: ISU_CD
        data_type: VARCHAR
        description: 12-character stock code — joins to STOCK_REFERENCE.STOCK_CODE.
        synonyms: [종목코드, ticker, symbol, 종목]
      - name: SEQ
        expr: INFO_DSTB_SEQ
        data_type: NUMBER
        description: >
          Information distribution sequence number — monotonically increasing within
          (DW_DATE, MKT_ID, BRD_ID, ISU_CD). Used for ordering ticks.
        synonyms: [순번, sequence, seq, tick sequence]
      - name: SESSION_ID
        expr: SESS_ID
        data_type: VARCHAR
        sample_values: ['10', '20', '30']
        description: Trading session ID. 10=pre-market, 20=regular session, 30=after-hours.
        synonyms: [세션, session, trading session, 장 구분]
      - name: EXECUTION_TIME
        expr: TDG_PROCS_DTLS_TIME
        data_type: VARCHAR
        description: >
          Detailed execution timestamp as VARCHAR(12), format HHMMSSmmmuuu
          (hours, minutes, seconds, milliseconds, microseconds).
        synonyms: [체결 시각, time, timestamp, 체결 시간]
      - name: PRICE_CHANGE_TYPE
        expr: PRDY_CMP_TP_CD
        data_type: VARCHAR
        sample_values: ['1', '2', '3', '4', '5']
        description: Price change direction vs previous day. 1=upper limit, 2=rise, 3=unchanged, 4=fall, 5=lower limit.
        synonyms: [등락 구분, price direction, up/down, 전일 대비 구분]
      - name: LAST_ASK_BID_TYPE
        expr: LST_AKNB_TP_CD
        data_type: VARCHAR
        sample_values: ['1', '2']
        description: >
          Whether this execution was ask-initiated (sell aggressor=1) or
          bid-initiated (buy aggressor=2).
        synonyms: [매도/매수 구분, aggressor side, taker side, 체결 구분]

    measures:
      - name: PRICE_CHANGE_VS_PREV
        expr: AVG(PRDY_CMP_PRC)
        data_type: NUMBER
        description: Price change amount vs previous day close (KRW). Negative = decline.
        synonyms: [전일 대비 가격, change, 등락폭, price change]
      - name: EXECUTION_PRICE
        expr: AVG(TD_PRC)
        data_type: NUMBER
        description: Trade execution price in KRW for this tick.
        synonyms: [체결가, 체결가격, price, trade price, 거래가]
      - name: TRADE_QUANTITY
        expr: SUM(TRD_QTY)
        data_type: NUMBER
        description: Number of shares matched in this single execution.
        synonyms: [체결량, 거래량, volume, shares traded, quantity]
      - name: OPEN_PRICE
        expr: MAX(OPPR)
        data_type: NUMBER
        description: Opening price of the day (시가) — first execution price of the session.
        synonyms: [시가, open, opening price, 시초가]
      - name: HIGH_PRICE
        expr: MAX(HGPR)
        data_type: NUMBER
        description: Intraday high price (고가) as of this tick.
        synonyms: [고가, high, intraday high, 최고가]
      - name: LOW_PRICE
        expr: MIN(LWPR)
        data_type: NUMBER
        description: Intraday low price (저가) as of this tick.
        synonyms: [저가, low, intraday low, 최저가]
      - name: ACCUMULATED_VOLUME
        expr: MAX(ACC_TRD_QTY)
        data_type: NUMBER
        description: Cumulative trading volume (shares) for the day up to and including this tick.
        synonyms: [누적 거래량, cumulative volume, running volume, total volume]
      - name: ACCUMULATED_VALUE
        expr: MAX(ACC_TRVAL)
        data_type: NUMBER
        description: Cumulative trading value (KRW) for the day up to this tick.
        synonyms: [누적 거래대금, cumulative value, turnover, 거래대금]
      - name: LP_HOLDING_QUANTITY
        expr: SUM(LP_HOLD_QTY)
        data_type: NUMBER
        description: Liquidity provider (LP) holding quantity at time of execution.
        synonyms: [유동성공급자 보유량, LP holding, LP inventory]
      - name: BEST_ASK_PRICE
        expr: AVG(AKFB_OD_PRC)
        data_type: NUMBER
        description: Best ask price (lowest sell order) at the moment of this execution.
        synonyms: [매도 1호가, best ask, ask price, 매도호가]
      - name: BEST_BID_PRICE
        expr: AVG(BDFB_OD_PRC)
        data_type: NUMBER
        description: Best bid price (highest buy order) at the moment of this execution.
        synonyms: [매수 1호가, best bid, bid price, 매수호가]
      - name: VWAP
        expr: DIV0(SUM(TD_PRC * TRD_QTY), SUM(TRD_QTY))
        data_type: NUMBER
        description: Volume-weighted average price across selected executions.
        synonyms: [VWAP, 가중평균가격, volume weighted price, 거래량 가중 평균]
      - name: TRADE_COUNT
        expr: COUNT(*)
        data_type: NUMBER
        description: Number of individual trade executions in the selected group.
        synonyms: [체결 건수, trades, tick count, 체결 수]
      - name: SPREAD
        expr: AVG(AKFB_OD_PRC - BDFB_OD_PRC)
        data_type: NUMBER
        description: Bid-ask spread at execution (ask price − bid price, KRW).
        synonyms: [스프레드, bid-ask spread, spread]


  # ---------------------------------------------------------------------------
  # Order Book Depth  (NX_HT_ONL_MKTPR_B6)
  # ---------------------------------------------------------------------------
  - name: ORDER_BOOK
    description: >
      Full 10-level bid/ask order book snapshots. Each row captures the complete
      depth-of-market at a point in time: ask prices ranked lowest first (levels 1–10),
      bid prices ranked highest first (levels 1–10), remaining quantities at each level,
      mid-price, expected execution price/quantity, and total open-side quantities.
      413.9M rows. Used for order flow imbalance, liquidity, and market microstructure analysis.
    base_table:
      database: NEXTRADE_EQUITY_MARKET_DATA
      schema: FIN
      table: NX_HT_ONL_MKTPR_B6

    time_dimensions:
      - name: DW_DATE
        expr: DWDD
        data_type: DATE
        description: Trading date for this order book snapshot.
        synonyms: [날짜, date, 거래일]

    dimensions:
      - name: MARKET_ID
        expr: MKT_ID
        data_type: VARCHAR
        sample_values: [STK, KSQ]
        description: Market identifier. STK=KOSPI, KSQ=KOSDAQ.
        synonyms: [시장, market, 코스피, 코스닥]
      - name: BOARD_ID
        expr: BRD_ID
        data_type: VARCHAR
        description: Board ID within the market.
        synonyms: [보드, board]
      - name: STOCK_CODE
        expr: ISU_CD
        data_type: VARCHAR
        description: 12-character stock code — joins to STOCK_REFERENCE.STOCK_CODE.
        synonyms: [종목코드, ticker, symbol]
      - name: SEQ
        expr: INFO_DSTB_SEQ
        data_type: NUMBER
        description: >
          Information distribution sequence — monotonically increasing within
          (DW_DATE, MKT_ID, BRD_ID, ISU_CD). Orders snapshots chronologically.
        synonyms: [순번, sequence, seq]
      - name: SESSION_ID
        expr: SESS_ID
        data_type: VARCHAR
        description: Trading session ID (pre-market=10, regular=20, after-hours=30).
        synonyms: [세션, session, 장 구분]
      - name: SNAPSHOT_TIME
        expr: TDG_PROCS_DTLS_TIME
        data_type: VARCHAR
        description: Snapshot timestamp as VARCHAR(12), format HHMMSSmmmuuu.
        synonyms: [스냅샷 시각, time, timestamp, 호가 시각]

    measures:
      # Level 1
      - name: ASK_PRICE_L1
        expr: AVG(ASK_STEP1_BSOD_PRC)
        data_type: NUMBER
        description: Level 1 ask price — the lowest (best) ask price in the book.
        synonyms: [매도 1호가, best ask, ask1, ask price]
      - name: BID_PRICE_L1
        expr: AVG(BID_STEP1_BSOD_PRC)
        data_type: NUMBER
        description: Level 1 bid price — the highest (best) bid price in the book.
        synonyms: [매수 1호가, best bid, bid1, bid price]
      - name: ASK_QUANTITY_L1
        expr: SUM(ASK_STEP1_BSOD_RQTY)
        data_type: NUMBER
        description: Remaining (unfilled) quantity at best ask level 1.
        synonyms: [매도 1잔량, ask quantity, ask size, best ask qty]
      - name: BID_QUANTITY_L1
        expr: SUM(BID_STEP1_BSOD_RQTY)
        data_type: NUMBER
        description: Remaining (unfilled) quantity at best bid level 1.
        synonyms: [매수 1잔량, bid quantity, bid size, best bid qty]
      # Level 2
      - name: ASK_PRICE_L2
        expr: AVG(ASK_STEP2_BSOD_PRC)
        data_type: NUMBER
        description: Level 2 ask price — second lowest ask in the order book.
        synonyms: [매도 2호가, ask2, second ask]
      - name: BID_PRICE_L2
        expr: AVG(BID_STEP2_BSOD_PRC)
        data_type: NUMBER
        description: Level 2 bid price — second highest bid in the order book.
        synonyms: [매수 2호가, bid2, second bid]
      - name: ASK_QUANTITY_L2
        expr: SUM(ASK_STEP2_BSOD_RQTY)
        data_type: NUMBER
        description: Remaining quantity at ask level 2.
        synonyms: [매도 2잔량, ask2 qty]
      - name: BID_QUANTITY_L2
