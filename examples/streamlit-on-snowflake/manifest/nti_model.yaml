        synonyms: [매수 6호가, bid6]
      - name: ASK_QUANTITY_L6
        expr: SUM(ASK_STEP6_BSOD_RQTY)
        data_type: NUMBER
        description: Remaining quantity at ask level 6.
        synonyms: [매도 6잔량, ask6 qty]
      - name: BID_QUANTITY_L6
        expr: SUM(BID_STEP6_BSOD_RQTY)
        data_type: NUMBER
        description: Remaining quantity at bid level 6.
        synonyms: [매수 6잔량, bid6 qty]
      # Level 7
      - name: ASK_PRICE_L7
        expr: AVG(ASK_STEP7_BSOD_PRC)
        data_type: NUMBER
        description: Level 7 ask price.
        synonyms: [매도 7호가, ask7]
      - name: BID_PRICE_L7
        expr: AVG(BID_STEP7_BSOD_PRC)
        data_type: NUMBER
        description: Level 7 bid price.
        synonyms: [매수 7호가, bid7]
      - name: ASK_QUANTITY_L7
        expr: SUM(ASK_STEP7_BSOD_RQTY)
        data_type: NUMBER
        description: Remaining quantity at ask level 7.
        synonyms: [매도 7잔량, ask7 qty]
      - name: BID_QUANTITY_L7
        expr: SUM(BID_STEP7_BSOD_RQTY)
        data_type: NUMBER
        description: Remaining quantity at bid level 7.
        synonyms: [매수 7잔량, bid7 qty]
      # Level 8
      - name: ASK_PRICE_L8
        expr: AVG(ASK_STEP8_BSOD_PRC)
        data_type: NUMBER
        description: Level 8 ask price.
        synonyms: [매도 8호가, ask8]
      - name: BID_PRICE_L8
        expr: AVG(BID_STEP8_BSOD_PRC)
        data_type: NUMBER
        description: Level 8 bid price.
        synonyms: [매수 8호가, bid8]
      - name: ASK_QUANTITY_L8
        expr: SUM(ASK_STEP8_BSOD_RQTY)
        data_type: NUMBER
