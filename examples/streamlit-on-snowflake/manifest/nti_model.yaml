        synonyms: [매도 4호가, ask4]
      - name: BID_PRICE_L4
        expr: AVG(BID_STEP4_BSOD_PRC)
        data_type: NUMBER
        description: Level 4 bid price.
        synonyms: [매수 4호가, bid4]
      - name: ASK_QUANTITY_L4
        expr: SUM(ASK_STEP4_BSOD_RQTY)
        data_type: NUMBER
        description: Remaining quantity at ask level 4.
        synonyms: [매도 4잔량, ask4 qty]
      - name: BID_QUANTITY_L4
        expr: SUM(BID_STEP4_BSOD_RQTY)
        data_type: NUMBER
        description: Remaining quantity at bid level 4.
        synonyms: [매수 4잔량, bid4 qty]
      # Level 5
      - name: ASK_PRICE_L5
        expr: AVG(ASK_STEP5_BSOD_PRC)
        data_type: NUMBER
        description: Level 5 ask price.
        synonyms: [매도 5호가, ask5]
      - name: BID_PRICE_L5
        expr: AVG(BID_STEP5_BSOD_PRC)
        data_type: NUMBER
        description: Level 5 bid price.
        synonyms: [매수 5호가, bid5]
      - name: ASK_QUANTITY_L5
        expr: SUM(ASK_STEP5_BSOD_RQTY)
        data_type: NUMBER
        description: Remaining quantity at ask level 5.
        synonyms: [매도 5잔량, ask5 qty]
      - name: BID_QUANTITY_L5
        expr: SUM(BID_STEP5_BSOD_RQTY)
        data_type: NUMBER
        description: Remaining quantity at bid level 5.
        synonyms: [매수 5잔량, bid5 qty]
      # Level 6
      - name: ASK_PRICE_L6
        expr: AVG(ASK_STEP6_BSOD_PRC)
        data_type: NUMBER
        description: Level 6 ask price.
        synonyms: [매도 6호가, ask6]
      - name: BID_PRICE_L6
        expr: AVG(BID_STEP6_BSOD_PRC)
        data_type: NUMBER
