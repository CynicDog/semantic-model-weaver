        synonyms: [총 매수 잔량, total bid, total buy side, 매수 잔량 합계]
      - name: EXPECTED_EXECUTION_PRICE
        expr: AVG(DEEM_TD_PRC)
        data_type: NUMBER
        description: Expected (deemed) execution price — hypothetical match price if auction closed now.
        synonyms: [예상 체결가, expected price, implied price, 추정 체결가]
      - name: EXPECTED_EXECUTION_QUANTITY
        expr: SUM(DEEM_TD_QTY)
        data_type: NUMBER
        description: Expected execution quantity if the auction matched at this moment.
        synonyms: [예상 체결량, expected quantity, implied quantity]
      - name: MID_PRICE
        expr: AVG(MID_PRC)
        data_type: NUMBER
        description: Mid price = (best ask + best bid) / 2.
        synonyms: [중간가, mid price, midpoint, 중간 호가]
      - name: ASK_MID_PRICE_QUANTITY
        expr: SUM(ASK_MDPR_RQTY_SUM_QTY)
        data_type: NUMBER
        description: Ask-side remaining quantity summed at the mid-price level.
        synonyms: [매도 중간가 잔량, ask mid qty]
      - name: BID_MID_PRICE_QUANTITY
        expr: SUM(BID_MDPR_RQTY_SUM_QTY)
        data_type: NUMBER
        description: Bid-side remaining quantity summed at the mid-price level.
        synonyms: [매수 중간가 잔량, bid mid qty]
      - name: ORDER_FLOW_IMBALANCE
        expr: DIV0(SUM(BID_STEP1_BSOD_RQTY) - SUM(ASK_STEP1_BSOD_RQTY), SUM(BID_STEP1_BSOD_RQTY) + SUM(ASK_STEP1_BSOD_RQTY))
        data_type: NUMBER
        description: >
          Level-1 order flow imbalance: (bid_qty - ask_qty) / (bid_qty + ask_qty).
          Range: -1 to +1. Positive = buy pressure. Negative = sell pressure.
        synonyms: [오더 플로우 불균형, OFI, buy-sell imbalance, order imbalance, pressure]
      - name: SPREAD
        expr: AVG(ASK_STEP1_BSOD_PRC - BID_STEP1_BSOD_PRC)
        data_type: NUMBER
        description: Bid-ask spread at level 1 (ask price − bid price, KRW).
        synonyms: [스프레드, bid-ask spread, spread]


  # ---------------------------------------------------------------------------
  # Closing Auction  (NX_HT_ONL_MKTPR_E1)
  # ---------------------------------------------------------------------------
  - name: CLOSING_AUCTION
    description: >
      Closing auction (종가매매) quote data. At market close, KRX runs a call auction
      where all remaining orders match at a single clearing price. This table tracks
      remaining ask/bid quantities during that auction window.
      Price is fixed at the day's close; only unfilled quantities differ.
      80K rows.
    base_table:
      database: NEXTRADE_EQUITY_MARKET_DATA
      schema: FIN
      table: NX_HT_ONL_MKTPR_E1

    time_dimensions:
      - name: DW_DATE
        expr: DWDD
        data_type: DATE
        description: Trading date for this closing auction record.
        synonyms: [날짜, date, 거래일]

    dimensions:
      - name: MARKET_ID
        expr: MKT_ID
        data_type: VARCHAR
        sample_values: [STK, KSQ]
        description: Market identifier. STK=KOSPI, KSQ=KOSDAQ.
        synonyms: [시장, market, 코스피, 코스닥]
      - name: BOARD_ID
        expr: BRD_ID
        data_type: VARCHAR
        description: Board ID within the market.
        synonyms: [보드, board]
      - name: STOCK_CODE
        expr: ISU_CD
        data_type: VARCHAR
        description: 12-character stock code — joins to STOCK_REFERENCE.STOCK_CODE.
        synonyms: [종목코드, ticker, symbol]
      - name: SEQ
        expr: INFO_DSTB_SEQ
        data_type: NUMBER
        description: Information distribution sequence — orders records chronologically.
        synonyms: [순번, sequence, seq]

    measures:
      - name: TOTAL_ASK_QUANTITY
        expr: SUM(AKOD_TOT_RQTY)
        data_type: NUMBER
        description: Total remaining sell (ask) quantity in the closing auction.
        synonyms: [매도 잔량, ask quantity, closing sell, 종가 매도 잔량]
      - name: TOTAL_BID_QUANTITY
        expr: SUM(BIOD_TOT_RQTY)
        data_type: NUMBER
        description: Total remaining buy (bid) quantity in the closing auction.
        synonyms: [매수 잔량, bid quantity, closing buy, 종가 매수 잔량]
      - name: CLOSING_IMBALANCE
        expr: DIV0(SUM(BIOD_TOT_RQTY) - SUM(AKOD_TOT_RQTY), SUM(BIOD_TOT_RQTY) + SUM(AKOD_TOT_RQTY))
        data_type: NUMBER
        description: >
          Closing auction buy/sell imbalance: (bid_qty - ask_qty) / (bid_qty + ask_qty).
          Range: -1 to +1. Positive = excess buy demand at close.
        synonyms: [종가 불균형, closing pressure, closing imbalance, 종가 매매 불균형]


  # ---------------------------------------------------------------------------
  # Market Breadth  (NX_HT_ONL_STATS_B5)
  # ---------------------------------------------------------------------------
  - name: MARKET_BREADTH
    description: >
      Market-level breadth statistics updated approximately every 90 seconds.
      Counts of rising, falling, unchanged, upper-limit, lower-limit, and momentum stocks
      per market (KOSPI / KOSDAQ). Core indicator for overall market sentiment and direction.
      233K rows.
    base_table:
      database: NEXTRADE_EQUITY_MARKET_DATA
      schema: FIN
      table: NX_HT_ONL_STATS_B5

    time_dimensions:
      - name: DW_DATE
        expr: DWDD
        data_type: DATE
        description: Trading date.
        synonyms: [날짜, date, 거래일]

    dimensions:
      - name: MARKET_ID
        expr: MKT_ID
        data_type: VARCHAR
        sample_values: [STK, KSQ]
        description: Market identifier. STK=KOSPI, KSQ=KOSDAQ.
        synonyms: [시장, market, 코스피, 코스닥, exchange]
      - name: CALC_TIME
        expr: DATA_CALC_TIME
        data_type: VARCHAR
        description: Calculation timestamp (approximately every 90 seconds during the session).
        synonyms: [산출 시각, time, timestamp, 집계 시각]

    measures:
      - name: TOTAL_ISSUES
        expr: SUM(FLUC_OBJ_ISU_CT)
        data_type: NUMBER
        description: Total number of issues subject to price fluctuation tracking.
        synonyms: [전체 종목 수, total stocks, total issues, 총 종목]
      - name: TRADED_ISSUES
        expr: SUM(FLUC_TRD_FORM_CT)
        data_type: NUMBER
        description: Number of issues that formed at least one trade during the session.
        synonyms: [거래 형성 종목 수, traded count, active issues]
      - name: UPPER_LIMIT_COUNT
        expr: SUM(FLUC_UPLM_CT)
        data_type: NUMBER
        description: Number of stocks currently at upper limit price (상한가, +30%).
        synonyms: [상한가 종목 수, upper limit, limit up count, 상한가 수]
      - name: RISING_COUNT
        expr: SUM(FLUC_UP_CT)
        data_type: NUMBER
        description: Number of stocks currently trading above previous close (상승).
        synonyms: [상승 종목 수, up count, advancing, rising stocks]
      - name: UNCHANGED_COUNT
        expr: SUM(FLUC_STDN_CT)
        data_type: NUMBER
        description: Number of stocks unchanged vs previous close (보합).
        synonyms: [보합 종목 수, unchanged, flat, 보합 수]
      - name: LOWER_LIMIT_COUNT
        expr: SUM(FLUC_LWLM_CT)
        data_type: NUMBER
        description: Number of stocks currently at lower limit price (하한가, -30%).
        synonyms: [하한가 종목 수, lower limit, limit down count, 하한가 수]
      - name: FALLING_COUNT
        expr: SUM(FLUC_DN_CT)
        data_type: NUMBER
        description: Number of stocks currently trading below previous close (하락).
        synonyms: [하락 종목 수, down count, declining, falling stocks]
      - name: MOMENTUM_COUNT
        expr: SUM(FLUC_BQUT_CT)
        data_type: NUMBER
        description: Total number of momentum (급등락) stocks — either surging or plunging.
        synonyms: [급등락 종목 수, momentum stocks, volatile stocks]
      - name: MOMENTUM_UP_COUNT
        expr: SUM(FLUC_BQUT_UP_CT)
        data_type: NUMBER
        description: Number of momentum stocks with strong upward movement (급등).
        synonyms: [급등 종목 수, surging stocks, momentum up]
      - name: MOMENTUM_DOWN_COUNT
        expr: SUM(FLUC_BQUT_DN_CT)
        data_type: NUMBER
        description: Number of momentum stocks with strong downward movement (급락).
        synonyms: [급락 종목 수, plunging stocks, momentum down]
      - name: ADVANCE_DECLINE_RATIO
        expr: DIV0(SUM(FLUC_UP_CT), SUM(FLUC_DN_CT))
        data_type: NUMBER
        description: Advance/decline ratio. >1 means more rising stocks than falling. Market breadth indicator.
        synonyms: [등락 비율, A/D ratio, breadth ratio, 상승/하락 비율]
      - name: NET_ADVANCING
        expr: SUM(FLUC_UP_CT) - SUM(FLUC_DN_CT)
        data_type: NUMBER
        description: Net advancing issues = rising count minus falling count. Positive = bullish breadth.
        synonyms: [순 상승 종목, net advancing, breadth net]


  # ---------------------------------------------------------------------------
  # Program Trading by Stock  (NX_HT_ONL_STATS_C3)
  # ---------------------------------------------------------------------------
  - name: PROGRAM_TRADING_BY_STOCK
    description: >
      Per-stock program trading statistics updated approximately every 90 seconds.
      Separates arbitrage (차익) from non-arbitrage (비차익) flows, and entrusted (TR=위탁)
      from proprietary (PC=자기) trading. Covers remaining order quantities and
      executed quantities/values for all four flow types on both buy and sell sides.
      Key signal for institutional / algorithmic activity at the stock level.
      8.6M rows.
    base_table:
      database: NEXTRADE_EQUITY_MARKET_DATA
      schema: FIN
      table: NX_HT_ONL_STATS_C3

    time_dimensions:
      - name: DW_DATE
        expr: DWDD
        data_type: DATE
        description: Trading date.
        synonyms: [날짜, date, 거래일]

    dimensions:
      - name: MARKET_ID
        expr: MKT_ID
        data_type: VARCHAR
        sample_values: [STK, KSQ]
        description: Market identifier. STK=KOSPI, KSQ=KOSDAQ.
        synonyms: [시장, market, 코스피, 코스닥]
      - name: STOCK_CODE
        expr: ISU_CD
        data_type: VARCHAR
        description: 12-character stock code — joins to STOCK_REFERENCE.STOCK_CODE.
        synonyms: [종목코드, ticker, symbol, 종목]
      - name: CALC_TIME
        expr: DATA_CALC_TIME
        data_type: VARCHAR
        description: Calculation timestamp (approximately every 90 seconds).
        synonyms: [산출 시각, time, timestamp]

    measures:
      # --- Remaining order quantities (open orders not yet executed) ---
      - name: ASK_ARB_REMAINING
        expr: SUM(ASK_ARB_RQTY)
        data_type: NUMBER
        description: Remaining (unfilled) arbitrage sell order quantity.
        synonyms: [차익 매도 잔량, arb ask remaining, arb sell remaining]
      - name: BID_ARB_REMAINING
        expr: SUM(BID_ARB_RQTY)
        data_type: NUMBER
        description: Remaining (unfilled) arbitrage buy order quantity.
        synonyms: [차익 매수 잔량, arb bid remaining, arb buy remaining]
      - name: ASK_NARB_REMAINING
        expr: SUM(ASK_NARB_RQTY)
        data_type: NUMBER
        description: Remaining (unfilled) non-arbitrage sell order quantity.
        synonyms: [비차익 매도 잔량, non-arb ask remaining, non-arb sell remaining]
      - name: BID_NARB_REMAINING
        expr: SUM(BID_NARB_RQTY)
        data_type: NUMBER
        description: Remaining (unfilled) non-arbitrage buy order quantity.
        synonyms: [비차익 매수 잔량, non-arb bid remaining, non-arb buy remaining]
      # --- Executed quantities (all channels combined) ---
      - name: TOTAL_ARB_SELL_QTY
        expr: SUM(ASK_ARB_QTY)
        data_type: NUMBER
        description: Total arbitrage sell quantity executed (all channels).
        synonyms: [차익 매도 수량, arb sell qty, arb ask qty]
      - name: TOTAL_ARB_BUY_QTY
        expr: SUM(BID_ARB_QTY)
        data_type: NUMBER
        description: Total arbitrage buy quantity executed (all channels).
        synonyms: [차익 매수 수량, arb buy qty, arb bid qty]
      - name: TOTAL_NARB_SELL_QTY
        expr: SUM(ASK_NARB_QTY)
        data_type: NUMBER
        description: Total non-arbitrage sell quantity executed (all channels).
        synonyms: [비차익 매도 수량, non-arb sell qty]
      - name: TOTAL_NARB_BUY_QTY
        expr: SUM(BID_NARB_QTY)
        data_type: NUMBER
        description: Total non-arbitrage buy quantity executed (all channels).
        synonyms: [비차익 매수 수량, non-arb buy qty]
      # --- Entrusted (위탁, TR) executed quantities ---
      - name: ENTRUSTED_ARB_SELL_QTY
        expr: SUM(TRAK_ARB_TD_QTY)
        data_type: NUMBER
        description: Entrusted (client/위탁) arbitrage sell executed quantity.
        synonyms: [위탁 차익 매도 수량, TR arb sell qty]
      - name: ENTRUSTED_ARB_BUY_QTY
        expr: SUM(TRBD_ARB_TD_QTY)
        data_type: NUMBER
        description: Entrusted (client/위탁) arbitrage buy executed quantity.
        synonyms: [위탁 차익 매수 수량, TR arb buy qty]
      - name: ENTRUSTED_NARB_SELL_QTY
        expr: SUM(TRAK_NARB_TD_QTY)
        data_type: NUMBER
        description: Entrusted (client/위탁) non-arbitrage sell executed quantity.
        synonyms: [위탁 비차익 매도 수량, TR non-arb sell qty]
      - name: ENTRUSTED_NARB_BUY_QTY
        expr: SUM(TRBD_NARB_TD_QTY)
        data_type: NUMBER
        description: Entrusted (client/위탁) non-arbitrage buy executed quantity.
        synonyms: [위탁 비차익 매수 수량, TR non-arb buy qty]
      # --- Proprietary (자기, PC) executed quantities ---
      - name: PROPRIETARY_ARB_SELL_QTY
        expr: SUM(PCAK_ARB_TD_QTY)
        data_type: NUMBER
        description: Proprietary (자기/PC) arbitrage sell executed quantity.
        synonyms: [자기 차익 매도 수량, PC arb sell qty]
      - name: PROPRIETARY_ARB_BUY_QTY
        expr: SUM(PCBD_ARB_TD_QTY)
        data_type: NUMBER
        description: Proprietary (자기/PC) arbitrage buy executed quantity.
        synonyms: [자기 차익 매수 수량, PC arb buy qty]
      - name: PROPRIETARY_NARB_SELL_QTY
        expr: SUM(PCAK_NARB_TD_QTY)
        data_type: NUMBER
        description: Proprietary (자기/PC) non-arbitrage sell executed quantity.
        synonyms: [자기 비차익 매도 수량, PC non-arb sell qty]
      - name: PROPRIETARY_NARB_BUY_QTY
        expr: SUM(PCBD_NARB_TD_QTY)
        data_type: NUMBER
        description: Proprietary (자기/PC) non-arbitrage buy executed quantity.
        synonyms: [자기 비차익 매수 수량, PC non-arb buy qty]
      # --- Trade values (KRW) ---
      - name: ENTRUSTED_ARB_SELL_VALUE
        expr: SUM(TRAK_ARB_TRVAL)
        data_type: NUMBER
        description: Entrusted arbitrage sell trade value in KRW.
        synonyms: [위탁 차익 매도 금액, TR arb sell value]
      - name: ENTRUSTED_ARB_BUY_VALUE
        expr: SUM(TRBD_ARB_TRVAL)
        data_type: NUMBER
        description: Entrusted arbitrage buy trade value in KRW.
        synonyms: [위탁 차익 매수 금액, TR arb buy value]
      - name: ENTRUSTED_NARB_SELL_VALUE
        expr: SUM(TRAK_NARB_TRVAL)
        data_type: NUMBER
        description: Entrusted non-arbitrage sell trade value in KRW.
        synonyms: [위탁 비차익 매도 금액, TR non-arb sell value]
      - name: ENTRUSTED_NARB_BUY_VALUE
        expr: SUM(TRBD_NARB_TRVAL)
        data_type: NUMBER
        description: Entrusted non-arbitrage buy trade value in KRW.
        synonyms: [위탁 비차익 매수 금액, TR non-arb buy value]
      - name: PROPRIETARY_ARB_SELL_VALUE
        expr: SUM(PCAK_ARB_TRVAL)
        data_type: NUMBER
        description: Proprietary arbitrage sell trade value in KRW.
        synonyms: [자기 차익 매도 금액, PC arb sell value]
      - name: PROPRIETARY_ARB_BUY_VALUE
        expr: SUM(PCBD_ARB_TRVAL)
        data_type: NUMBER
        description: Proprietary arbitrage buy trade value in KRW.
        synonyms: [자기 차익 매수 금액, PC arb buy value]
      - name: PROPRIETARY_NARB_SELL_VALUE
        expr: SUM(PCAK_NARB_TRVAL)
        data_type: NUMBER
        description: Proprietary non-arbitrage sell trade value in KRW.
        synonyms: [자기 비차익 매도 금액, PC non-arb sell value]
      - name: PROPRIETARY_NARB_BUY_VALUE
        expr: SUM(PCBD_NARB_TRVAL)
        data_type: NUMBER
        description: Proprietary non-arbitrage buy trade value in KRW.
        synonyms: [자기 비차익 매수 금액, PC non-arb buy value]
      # --- Aggregated convenience measures ---
      - name: TOTAL_PROGRAM_BUY_VALUE
        expr: SUM(TRBD_ARB_TRVAL + TRBD_NARB_TRVAL + PCBD_ARB_TRVAL + PCBD_NARB_TRVAL)
        data_type: NUMBER
        description: Total program buy trade value in KRW (arb + non-arb, entrusted + proprietary).
        synonyms: [프로그램 매수 금액, program buy value, 총 매수]
      - name: TOTAL_PROGRAM_SELL_VALUE
        expr: SUM(TRAK_ARB_TRVAL + TRAK_NARB_TRVAL + PCAK_ARB_TRVAL + PCAK_NARB_TRVAL)
        data_type: NUMBER
        description: Total program sell trade value in KRW.
        synonyms: [프로그램 매도 금액, program sell value, 총 매도]
      - name: NET_PROGRAM_VALUE
        expr: SUM((TRBD_ARB_TRVAL + TRBD_NARB_TRVAL + PCBD_ARB_TRVAL + PCBD_NARB_TRVAL) - (TRAK_ARB_TRVAL + TRAK_NARB_TRVAL + PCAK_ARB_TRVAL + PCAK_NARB_TRVAL))
        data_type: NUMBER
        description: >
          Net program trading value (buy value − sell value) in KRW.
          Positive = net institutional buy. Negative = net institutional sell.
        synonyms: [순 프로그램 매수, net program, institutional net, 프로그램 순매수]


  # ---------------------------------------------------------------------------
  # Program Trading by Investor Type  (NX_HT_ONL_STATS_P0)
  # ---------------------------------------------------------------------------
  - name: PROGRAM_TRADING_BY_INVESTOR
    description: >
      Program trading statistics aggregated by investor type, updated approximately
      every 90 seconds. Shows which investor categories are driving program flows —
      individuals, foreigners, domestic institutions, pension funds, banks, etc.
      Covers both arbitrage and non-arbitrage, with executed quantities and values.
      164K rows.
    base_table:
      database: NEXTRADE_EQUITY_MARKET_DATA
      schema: FIN
      table: NX_HT_ONL_STATS_P0

    time_dimensions:
      - name: DW_DATE
        expr: DWDD
        data_type: DATE
        description: Trading date.
        synonyms: [날짜, date, 거래일]

    dimensions:
      - name: MARKET_ID
        expr: MKT_ID
        data_type: VARCHAR
        sample_values: [STK, KSQ]
        description: Market identifier. STK=KOSPI, KSQ=KOSDAQ.
        synonyms: [시장, market, 코스피, 코스닥]
      - name: INVESTOR_TYPE
        expr: IVTR_TP_CD
        data_type: VARCHAR
        sample_values: ['1000', '2000', '3000', '3100', '3200', '3300', '3400', '3500', '3600', '3700', '4000']
        description: >
          Investor type code.
          1000=개인(Individual), 2000=외국인(Foreign), 3000=기관합계(Total institution),
          3100=금융투자(Financial investment/securities firms), 3200=보험(Insurance),
          3300=투신(Investment trust), 3400=사모(Private equity fund),
          3500=은행(Bank), 3600=기타금융(Other financial), 3700=연기금(Pension fund),
          4000=기타법인(Other corporate).
        synonyms: [투자자 유형, investor, 외국인, 기관, 개인, 연기금, 보험, 은행, investor type]
      - name: CALC_TIME
        expr: DATA_CALC_TIME
        data_type: VARCHAR
        description: Calculation timestamp (approximately every 90 seconds).
        synonyms: [산출 시각, time, timestamp]

    measures:
      # --- Executed quantities ---
      - name: ARB_SELL_QTY
        expr: SUM(ASK_ARB_TD_QTY)
        data_type: NUMBER
        description: Arbitrage sell (ask) executed quantity by this investor type.
        synonyms: [차익 매도 수량, arb sell qty]
      - name: NARB_SELL_QTY
        expr: SUM(ASK_NARB_TD_QTY)
        data_type: NUMBER
        description: Non-arbitrage sell (ask) executed quantity by this investor type.
        synonyms: [비차익 매도 수량, non-arb sell qty]
      - name: ARB_BUY_QTY
        expr: SUM(BID_ARB_TD_QTY)
        data_type: NUMBER
        description: Arbitrage buy (bid) executed quantity by this investor type.
        synonyms: [차익 매수 수량, arb buy qty]
      - name: NARB_BUY_QTY
        expr: SUM(BID_NARB_TD_QTY)
        data_type: NUMBER
        description: Non-arbitrage buy (bid) executed quantity by this investor type.
        synonyms: [비차익 매수 수량, non-arb buy qty]
      # --- Trade values (KRW) ---
      - name: ARB_SELL_VALUE
        expr: SUM(ASK_ARB_TRVAL)
        data_type: NUMBER
        description: Arbitrage sell trade value in KRW by this investor type.
        synonyms: [차익 매도 금액, arb sell value]
      - name: NARB_SELL_VALUE
        expr: SUM(ASK_NARB_TRVAL)
        data_type: NUMBER
        description: Non-arbitrage sell trade value in KRW by this investor type.
        synonyms: [비차익 매도 금액, non-arb sell value]
      - name: ARB_BUY_VALUE
        expr: SUM(BID_ARB_TRVAL)
        data_type: NUMBER
        description: Arbitrage buy trade value in KRW by this investor type.
        synonyms: [차익 매수 금액, arb buy value]
      - name: NARB_BUY_VALUE
        expr: SUM(BID_NARB_TRVAL)
        data_type: NUMBER
        description: Non-arbitrage buy trade value in KRW by this investor type.
        synonyms: [비차익 매수 금액, non-arb buy value]
      # --- Aggregated convenience measures ---
      - name: TOTAL_BUY_VALUE
        expr: SUM(BID_ARB_TRVAL + BID_NARB_TRVAL)
        data_type: NUMBER
        description: Total program buy value (arb + non-arb) in KRW for this investor type.
        synonyms: [총 매수 금액, total buy, program buy, 매수 금액]
      - name: TOTAL_SELL_VALUE
        expr: SUM(ASK_ARB_TRVAL + ASK_NARB_TRVAL)
        data_type: NUMBER
        description: Total program sell value (arb + non-arb) in KRW for this investor type.
        synonyms: [총 매도 금액, total sell, program sell, 매도 금액]
      - name: NET_VALUE
        expr: SUM((BID_ARB_TRVAL + BID_NARB_TRVAL) - (ASK_ARB_TRVAL + ASK_NARB_TRVAL))
        data_type: NUMBER
        description: >
          Net buy/sell value for this investor type (buy − sell, KRW).
          Positive = net buyer. Negative = net seller.
        synonyms: [순매수, net buy, net position, 순매수 금액]
      - name: TOTAL_BUY_QTY
        expr: SUM(BID_ARB_TD_QTY + BID_NARB_TD_QTY)
        data_type: NUMBER
        description: Total program buy quantity (arb + non-arb) for this investor type.
        synonyms: [총 매수 수량, total buy quantity]
      - name: TOTAL_SELL_QTY
        expr: SUM(ASK_ARB_TD_QTY + ASK_NARB_TD_QTY)
        data_type: NUMBER
        description: Total program sell quantity (arb + non-arb) for this investor type.
        synonyms: [총 매도 수량, total sell quantity]
      - name: NET_QUANTITY
        expr: SUM((BID_ARB_TD_QTY + BID_NARB_TD_QTY) - (ASK_ARB_TD_QTY + ASK_NARB_TD_QTY))
        data_type: NUMBER
        description: Net buy/sell quantity for this investor type. Positive = net buyer.
        synonyms: [순매수 수량, net buy quantity, net qty]
