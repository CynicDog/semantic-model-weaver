        synonyms: [매도 10호가, ask10, deepest ask]
      - name: BID_PRICE_L10
        expr: AVG(BID_STEP10_BSOD_PRC)
        data_type: NUMBER
        description: Level 10 bid price — the deepest (worst) bid level tracked.
        synonyms: [매수 10호가, bid10, deepest bid]
      - name: ASK_QUANTITY_L10
