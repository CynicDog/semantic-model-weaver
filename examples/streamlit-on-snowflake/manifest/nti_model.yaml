        data_type: NUMBER
        description: Remaining quantity at bid level 2.
        synonyms: [매수 2잔량, bid2 qty]
      # Level 3
      - name: ASK_PRICE_L3
        expr: AVG(ASK_STEP3_BSOD_PRC)
        data_type: NUMBER
        description: Level 3 ask price.
        synonyms: [매도 3호가, ask3]
      - name: BID_PRICE_L3
        expr: AVG(BID_STEP3_BSOD_PRC)
        data_type: NUMBER
        description: Level 3 bid price.
        synonyms: [매수 3호가, bid3]
      - name: ASK_QUANTITY_L3
        expr: SUM(ASK_STEP3_BSOD_RQTY)
        data_type: NUMBER
        description: Remaining quantity at ask level 3.
        synonyms: [매도 3잔량, ask3 qty]
      - name: BID_QUANTITY_L3
