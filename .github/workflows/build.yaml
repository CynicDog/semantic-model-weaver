name: semantic-model-weaver CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - 'weaver/**'
      - 'examples/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add uv to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync

      - name: Run ruff lint
        run: uv run ruff check .

      - name: Run unit tests
        run: uv run pytest -v -m "not integration"

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: weaver-cli
            context: .
            dockerfile: Dockerfile
            tag: weaver-cli
          - name: nextrade
            context: ./examples/nextrade
            dockerfile: ./examples/nextrade/Dockerfile
            tag: nextrade
          - name: korean-population
            context: ./examples/korean_population
            dockerfile: ./examples/korean_population/Dockerfile
            tag: korean-population
          - name: seoul-floating-population
            context: ./examples/seoul_floating_population
            dockerfile: ./examples/seoul_floating_population/Dockerfile
            tag: seoul-floating-population
          - name: telecom
            context: ./examples/telecom
            dockerfile: ./examples/telecom/Dockerfile
            tag: telecom

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.tag }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
