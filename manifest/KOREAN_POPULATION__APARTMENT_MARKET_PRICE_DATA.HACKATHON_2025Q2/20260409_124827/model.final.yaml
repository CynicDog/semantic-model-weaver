verified_queries:
- name: what_is_the_average_meme_price_per_supply_pyeong
  question: What is the average MEME_PRICE_PER_SUPPLY_PYEONG for apartments in '서울' in 2025?
  sql: "WITH __region_apt_richgo_market_price_m_h AS (\n  SELECT\n    sd,\n    yyyymmdd,\n    meme_price_per_supply_pyeong\n\
    \  FROM korean_population__apartment_market_price_data.hackathon_2025q2.region_apt_richgo_market_price_m_h\n)\nSELECT\n\
    \  AVG(meme_price_per_supply_pyeong) AS avg_meme_price_per_supply_pyeong\nFROM __region_apt_richgo_market_price_m_h\n\
    WHERE\n  sd = '서울' AND DATE_PART('year', yyyymmdd) = 2025\n -- Generated by Cortex Analyst (request_id: d32a6ac7-1b0f-4d3f-92a0-038f8010222e)\n\
    ;"
  verified_at: 1775707161
  verified_by: weaver/v1.20260409_124827.iter1
- name: what_is_the_average_male_population_in_sd_for_ea
  question: What is the average male population in '서울' (SD) for each '시군구명' (SGG) in 2025?
  sql: "WITH __region_mois_population_gender_age_m_h AS (\n  SELECT\n    sd,\n    sgg,\n    yyyymmdd,\n    male\n  FROM korean_population__apartment_market_price_data.hackathon_2025q2.region_mois_population_gender_age_m_h\n\
    )\nSELECT\n  sgg,\n  AVG(male) AS avg_male_population\nFROM __region_mois_population_gender_age_m_h\nWHERE\n  sd = '서울'\
    \ AND DATE_PART('year', yyyymmdd) = 2025\nGROUP BY\n  sgg\nORDER BY\n  avg_male_population DESC NULLS LAST\n -- Generated\
    \ by Cortex Analyst (request_id: a643be89-8bfb-4666-a0e0-9d8aac565b11)\n;"
  verified_at: 1775707161
  verified_by: weaver/v1.20260409_124827.iter1
- name: what_is_the_average_market_price_per_supply_pyeo
  question: What is the average market price per supply pyeong for apartments in districts (SGG) with the highest ratio of
    children under 5 to females aged 20 to 40 for the latest date in the dataset?
  sql: "WITH __region_mois_population_age_under5_per_female_20to40_m_h AS (\n  SELECT\n    sgg,\n    yyyymmdd,\n    age_under5,\n\
    \    female_20to40\n  FROM korean_population__apartment_market_price_data.hackathon_2025q2.region_mois_population_age_under5_per_female_20to40_m_h\n\
    ), __region_apt_richgo_market_price_m_h AS (\n  SELECT\n    sgg,\n    yyyymmdd,\n    meme_price_per_supply_pyeong\n  FROM\
    \ korean_population__apartment_market_price_data.hackathon_2025q2.region_apt_richgo_market_price_m_h\n), latest_pop_date\
    \ AS (\n  SELECT\n    MAX(yyyymmdd) AS max_date\n  FROM __region_mois_population_age_under5_per_female_20to40_m_h\n),\
    \ latest_price_date AS (\n  SELECT\n    MAX(yyyymmdd) AS max_date\n  FROM __region_apt_richgo_market_price_m_h\n), pop_by_sgg\
    \ AS (\n  SELECT\n    p.sgg,\n    SUM(p.age_under5) AS total_age_under5,\n    SUM(p.female_20to40) AS total_female_20to40,\n\
    \    CASE\n      WHEN SUM(p.female_20to40) <> 0\n      THEN SUM(p.age_under5) / NULLIF(SUM(p.female_20to40), 0)\n    \
    \  ELSE NULL\n    END AS ratio_under5_per_female\n  FROM __region_mois_population_age_under5_per_female_20to40_m_h AS\
    \ p\n  CROSS JOIN latest_pop_date AS lpd\n  WHERE\n    p.yyyymmdd = lpd.max_date\n  GROUP BY\n    p.sgg\n), ranked_sgg\
    \ AS (\n  SELECT\n    sgg,\n    total_age_under5,\n    total_female_20to40,\n    ratio_under5_per_female,\n    RANK()\
    \ OVER (ORDER BY ratio_under5_per_female DESC NULLS LAST) AS rnk\n  FROM pop_by_sgg\n), top_sgg AS (\n  SELECT\n    sgg\n\
    \  FROM ranked_sgg\n  WHERE\n    rnk = 1\n), price_by_sgg AS (\n  SELECT\n    mp.sgg,\n    AVG(mp.meme_price_per_supply_pyeong)\
    \ AS avg_meme_price_per_supply_pyeong\n  FROM __region_apt_richgo_market_price_m_h AS mp\n  CROSS JOIN latest_price_date\
    \ AS lpd\n  WHERE\n    mp.yyyymmdd = lpd.max_date\n  GROUP BY\n    mp.sgg\n)\nSELECT\n  p.sgg,\n  rs.ratio_under5_per_female,\n\
    \  pr.avg_meme_price_per_supply_pyeong\nFROM top_sgg AS p\nJOIN ranked_sgg AS rs\n  ON p.sgg = rs.sgg\nLEFT OUTER JOIN\
    \ price_by_sgg AS pr\n  ON p.sgg = pr.sgg\nORDER BY\n  rs.ratio_under5_per_female DESC NULLS LAST\n -- Generated by Cortex\
    \ Analyst (request_id: 2040169a-24bb-49f9-9b49-21ff30c57d2a)\n;"
  verified_at: 1775707161
  verified_by: weaver/v1.20260409_124827.iter1
- name: what_is_the_average_ratio_of_children_under_5_to
  question: What is the average ratio of children under 5 to females aged 20 to 40 in Seoul for the year 2025?
  sql: "WITH __region_mois_population_age_under5_per_female_20to40_m_h AS (\n  SELECT\n    sd,\n    yyyymmdd,\n    age_under5_per_female_20to40\n\
    \  FROM korean_population__apartment_market_price_data.hackathon_2025q2.region_mois_population_age_under5_per_female_20to40_m_h\n\
    )\nSELECT\n  AVG(age_under5_per_female_20to40) AS avg_ratio_under5_per_female_20to40\nFROM __region_mois_population_age_under5_per_female_20to40_m_h\n\
    WHERE\n  sd = '서울' AND DATE_PART('year', yyyymmdd) = 2025\n -- Generated by Cortex Analyst (request_id: 676783ff-7d48-4b32-ba4e-6456dcb103f9)\n\
    ;"
  verified_at: 1775707161
  verified_by: weaver/v1.20260409_124827.iter1
- name: what_is_the_ratio_of_age_under5_to_female_20to40
  question: What is the ratio of AGE_UNDER5 to FEMALE_20TO40 in '영등포동8가' as of the latest date?
  sql: "WITH __region_mois_population_age_under5_per_female_20to40_m_h AS (\n  SELECT\n    emd,\n    yyyymmdd,\n    age_under5,\n\
    \    age_under5_per_female_20to40,\n    female_20to40\n  FROM korean_population__apartment_market_price_data.hackathon_2025q2.region_mois_population_age_under5_per_female_20to40_m_h\n\
    )\nSELECT\n  p.emd,\n  p.yyyymmdd,\n  SUM(p.age_under5) AS total_age_under5,\n  SUM(p.female_20to40) AS total_female_20to40,\n\
    \  SUM(p.age_under5_per_female_20to40) AS ratio_age_under5_per_female_20to40\nFROM __region_mois_population_age_under5_per_female_20to40_m_h\
    \ AS p\nWHERE\n  p.emd = '영등포동8가'\n  AND p.yyyymmdd = (\n    SELECT\n      MAX(yyyymmdd)\n    FROM __region_mois_population_age_under5_per_female_20to40_m_h\n\
