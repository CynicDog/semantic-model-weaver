name: seoul_districtlevel_data_floating_population_consumption_and_assets_grandata
description: Semantic model for SEOUL_DISTRICTLEVEL_DATA_FLOATING_POPULATION_CONSUMPTION_AND_ASSETS.GRANDATA
tables:
- name: ASSET_INCOME_INFO
  description: Monthly KCB customer group income and assets information
  base_table:
    database: SEOUL_DISTRICTLEVEL_DATA_FLOATING_POPULATION_CONSUMPTION_AND_ASSETS
    schema: GRANDATA
    table: ASSET_INCOME_INFO
  primary_key:
    columns:
    - AGE_GROUP
    - CITY_CODE
    - DISTRICT_CODE
    - GENDER
    - PROVINCE_CODE
    - STANDARD_YEAR_MONTH
  dimensions:
  - name: PROVINCE_CODE
    expr: PROVINCE_CODE
    data_type: VARCHAR
    description: Province code
    sample_values:
    - '11'
  - name: CITY_CODE
    expr: CITY_CODE
    data_type: VARCHAR
    description: City code
    sample_values:
    - '11560'
    - '11140'
    - '11650'
  - name: DISTRICT_CODE
    expr: DISTRICT_CODE
    data_type: VARCHAR
    description: District code
    sample_values:
    - '11560112'
    - '11140161'
    - '11140170'
    - '11140158'
    - '11560109'
  - name: STANDARD_YEAR_MONTH
    expr: STANDARD_YEAR_MONTH
    data_type: VARCHAR
    description: Standard year and month (YYYYMM)
    sample_values:
    - '202104'
    - '202305'
    - '202110'
    - '202312'
    - '202103'
  - name: INCOME_TYPE
    expr: INCOME_TYPE
    data_type: VARCHAR
    description: File classification (Residential/Corporate)
    sample_values:
    - '1'
    - '0'
  - name: GENDER
    expr: GENDER
    data_type: VARCHAR
    description: Gender
    sample_values:
    - F
    - M
  - name: AGE_GROUP
    expr: AGE_GROUP
    data_type: VARCHAR
    description: Age group
    sample_values:
    - '35'
    - '20'
    - '70'
    - '65'
    - '55'
  measures:
  - name: CUSTOMER_COUNT
    expr: SUM(CUSTOMER_COUNT)
    data_type: NUMBER
    description: 'Total population count (Unit: persons)'
  - name: RATE_MODEL_GROUP_LARGE_COMPANY_EMPLOYEE
    expr: SUM(RATE_MODEL_GROUP_LARGE_COMPANY_EMPLOYEE)
    data_type: FLOAT
    description: 'Occupation group ratio - Large company employees (Unit: %)'
  - name: RATE_MODEL_GROUP_GENERAL_EMPLOYEE
    expr: SUM(RATE_MODEL_GROUP_GENERAL_EMPLOYEE)
    data_type: FLOAT
    description: 'Occupation group ratio - General employees (Unit: %)'
  - name: RATE_MODEL_GROUP_PROFESSIONAL_EMPLOYEE
    expr: SUM(RATE_MODEL_GROUP_PROFESSIONAL_EMPLOYEE)
    data_type: FLOAT
    description: 'Occupation group ratio - Professional employees (Unit: %)'
  - name: RATE_MODEL_GROUP_EXECUTIVES
    expr: SUM(RATE_MODEL_GROUP_EXECUTIVES)
    data_type: FLOAT
    description: 'Occupation group ratio - Executives (Unit: %)'
  - name: RATE_MODEL_GROUP_GENERAL_SELF_EMPLOYED
