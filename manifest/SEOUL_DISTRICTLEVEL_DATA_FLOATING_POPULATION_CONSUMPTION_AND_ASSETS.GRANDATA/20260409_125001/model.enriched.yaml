    description: 'Occupation group ratio - Others (housewives, students, unemployed, etc.) (Unit: %)'
  - name: PYEONG_UNDER_20_COUNT
    expr: SUM(PYEONG_UNDER_20_COUNT)
    data_type: NUMBER
    description: '(Based on apartment) Number of residents living in under 20 pyeong units (Unit: persons)'
  - name: PYEONG_OVER_20_COUNT
    expr: SUM(PYEONG_OVER_20_COUNT)
    data_type: NUMBER
    description: '(Based on apartment) Number of residents living in 20-29 pyeong units (Unit: persons)'
  - name: PYEONG_OVER_30_COUNT
