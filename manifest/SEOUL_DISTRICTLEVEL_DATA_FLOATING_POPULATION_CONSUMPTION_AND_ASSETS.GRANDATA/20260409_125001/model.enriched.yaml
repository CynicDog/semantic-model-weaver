    data_type: FLOAT
    description: 'Occupation group ratio - General self-employed (Unit: %)'
  - name: RATE_MODEL_GROUP_PROFESSIONAL_SELF_EMPLOYED
    expr: SUM(RATE_MODEL_GROUP_PROFESSIONAL_SELF_EMPLOYED)
    data_type: FLOAT
    description: 'Occupation group ratio - Professional self-employed (Unit: %)'
  - name: RATE_MODEL_GROUP_OTHERS
