- name: what_is_the_total_visiting_population_for_each_a
  question: What is the total visiting population for each age group in Seoul on weekdays in 2023, joined with the customer
    count from the asset income info?
  sql: "WITH __floating_population_info AS (\n  SELECT\n    province_code,\n    standard_year_month,\n    weekday_weekend,\n\
    \    age_group,\n    visiting_population\n  FROM seoul_districtlevel_data_floating_population_consumption_and_assets.grandata.floating_population_info\n\
    ), __m_scco_mst AS (\n  SELECT\n    province_code,\n    province_eng_name\n  FROM seoul_districtlevel_data_floating_population_consumption_and_assets.grandata.m_scco_mst\n\
    ), __asset_income_info AS (\n  SELECT\n    province_code,\n    age_group,\n    customer_count\n  FROM seoul_districtlevel_data_floating_population_consumption_and_assets.grandata.asset_income_info\n\
    ), fp_agg AS (\n  SELECT\n    fp.province_code,\n    fp.age_group,\n    SUM(fp.visiting_population) AS total_visiting_population\n\
    \  FROM __floating_population_info AS fp\n  LEFT OUTER JOIN __m_scco_mst AS m\n    ON fp.province_code = m.province_code\n\
    \  WHERE\n    m.province_eng_name = 'Seoul'\n    AND fp.weekday_weekend = 'W'\n    AND fp.standard_year_month LIKE '2023%'\n\
    \  GROUP BY\n    fp.province_code,\n    fp.age_group\n), ai_agg AS (\n  SELECT\n    ai.province_code,\n    ai.age_group,\n\
    \    SUM(ai.customer_count) AS total_customer_count\n  FROM __asset_income_info AS ai\n  GROUP BY\n    ai.province_code,\n\
    \    ai.age_group\n)\nSELECT\n  fp_agg.age_group,\n  fp_agg.total_visiting_population,\n  ai_agg.total_customer_count\n\
    FROM fp_agg\nLEFT OUTER JOIN ai_agg\n  ON fp_agg.province_code = ai_agg.province_code\n  AND fp_agg.age_group = ai_agg.age_group\n\
    ORDER BY\n  fp_agg.age_group\n -- Generated by Cortex Analyst (request_id: e3f9a013-50d6-46c1-9878-0076747c1054)\n;"
  verified_at: 1775707397
  verified_by: weaver/v1.20260409_125001.iter1
- name: what_is_the_total_working_population_for_each_ti
  question: What is the total working population for each time slot in Seoul for the month of November 2023?
  sql: "WITH __floating_population_info AS (\n  SELECT\n    province_code,\n    standard_year_month,\n    time_slot,\n   \
    \ working_population\n  FROM seoul_districtlevel_data_floating_population_consumption_and_assets.grandata.floating_population_info\n\
    ), __m_scco_mst AS (\n  SELECT\n    province_code,\n    province_eng_name\n  FROM seoul_districtlevel_data_floating_population_consumption_and_assets.grandata.m_scco_mst\n\
    )\nSELECT\n  fp.time_slot,\n  SUM(fp.working_population) AS total_working_population\nFROM __floating_population_info\
    \ AS fp\nLEFT OUTER JOIN __m_scco_mst AS m\n  ON fp.province_code = m.province_code\nWHERE\n  m.province_eng_name = 'Seoul'\
    \ AND fp.standard_year_month = '202311'\nGROUP BY\n  fp.time_slot\nORDER BY\n  fp.time_slot ASC\n -- Generated by Cortex\
    \ Analyst (request_id: 9f71aa7b-0ff7-4d8d-aafb-c61eff27ca3b)\n;"
