    - CITY_CODE
    - DISTRICT_CODE
    - GENDER
    - PROVINCE_CODE
    - STANDARD_YEAR_MONTH
  dimensions:
  - name: PROVINCE_CODE
    expr: PROVINCE_CODE
    data_type: VARCHAR
    description: Province code
    sample_values:
    - '11'
  - name: CITY_CODE
    expr: CITY_CODE
    data_type: VARCHAR
    description: City code
    synonyms:
    - 'city'
    - 'city name'
    - 'city identifier'
    sample_values:
    - '11560'
    - '11140'
    - '11650'
  - name: DISTRICT_CODE
    expr: DISTRICT_CODE
    data_type: VARCHAR
    description: District code
    synonyms:
    - 'district'
    - 'district name'
    - 'district identifier'
    sample_values:
    - '11560112'
    - '11140161'
    - '11140170'
    - '11140158'
    - '11560109'
  - name: STANDARD_YEAR_MONTH
    expr: STANDARD_YEAR_MONTH
    data_type: VARCHAR
    description: Standard year and month (YYYYMM)
    synonyms:
    - 'year and month'
    - 'date'
    - 'year-month'
    sample_values:
    - '202104'
    - '202305'
    - '202110'
    - '202312'
    - '202103'
  - name: INCOME_TYPE
    expr: INCOME_TYPE
    data_type: VARCHAR
    description: File classification (Residential/Corporate)
    sample_values:
    - '1'
    - '0'
  - name: GENDER
    expr: GENDER
    data_type: VARCHAR
    description: Gender
    synonyms:
    - 'sex'
    - 'gender type'
    - 'gender category'
    sample_values:
