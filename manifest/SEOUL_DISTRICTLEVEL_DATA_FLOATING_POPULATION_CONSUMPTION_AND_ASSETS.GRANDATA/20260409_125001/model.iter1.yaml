- name: list_the_top_5_districts_in_seoul_with_the_highe
  question: List the top 5 districts in Seoul with the highest residential population in 2023.
  sql: "WITH __floating_population_info AS (\n  SELECT\n    province_code,\n    city_code,\n    district_code,\n    standard_year_month,\n\
    \    residential_population\n  FROM seoul_districtlevel_data_floating_population_consumption_and_assets.grandata.floating_population_info\n\
    ), __m_scco_mst AS (\n  SELECT\n    province_code,\n    city_code,\n    district_code,\n    city_kor_name,\n    district_kor_name,\n\
    \    province_eng_name,\n    district_eng_name\n  FROM seoul_districtlevel_data_floating_population_consumption_and_assets.grandata.m_scco_mst\n\
    ), district_pop AS (\n  SELECT\n    fp.district_code,\n    ms.district_kor_name,\n    ms.district_eng_name,\n    ms.city_kor_name,\n\
    \    SUM(fp.residential_population) AS total_residential_population\n  FROM __floating_population_info AS fp\n  LEFT OUTER\
    \ JOIN __m_scco_mst AS ms\n    ON fp.province_code = ms.province_code\n    AND fp.city_code = ms.city_code\n    AND fp.district_code\
    \ = ms.district_code\n  WHERE\n    fp.standard_year_month LIKE '2023%' AND ms.province_eng_name = 'Seoul'\n  GROUP BY\n\
    \    fp.district_code,\n    ms.district_kor_name,\n    ms.district_eng_name,\n    ms.city_kor_name\n)\nSELECT\n  district_code,\n\
    \  district_kor_name,\n  district_eng_name,\n  city_kor_name,\n  total_residential_population\nFROM district_pop\nORDER\
    \ BY\n  total_residential_population DESC NULLS LAST\nLIMIT 5\n -- Generated by Cortex Analyst (request_id: 390c9827-f889-47b1-a63e-835fb7c1e9e5)\n\
    ;"
  verified_at: 1775707397
  verified_by: weaver/v1.20260409_125001.iter1
