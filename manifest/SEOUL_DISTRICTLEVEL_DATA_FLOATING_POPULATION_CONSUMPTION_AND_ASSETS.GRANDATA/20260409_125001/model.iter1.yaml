    )\nSELECT\n  m.city_kor_name,\n  m.city_eng_name,\n  SUM(a.average_income) AS total_average_income\nFROM __asset_income_info\
    \ AS a\nLEFT OUTER JOIN __m_scco_mst AS m\n  ON a.province_code = m.province_code\nWHERE\n  m.province_eng_name = 'Seoul'\
