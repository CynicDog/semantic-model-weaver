    - M
  - name: AGE_GROUP
    expr: AGE_GROUP
    data_type: VARCHAR
    description: Age group
    synonyms:
    - 'age range'
    - 'age category'
    - 'age bracket'
    sample_values:
    - '35'
    - '20'
    - '70'
    - '65'
    - '55'
