- name: what_is_the_total_bid_arbitrage_transaction_valu
  question: What is the total bid arbitrage transaction value for each market ID and investor type code on the latest calculation
    time for each date?
  sql: "WITH __nx_ht_onl_stats_p0 AS (\n  SELECT\n    data_calc_time,\n    mkt_id,\n    ivtr_tp_cd,\n    dwdd,\n    bid_arb_trval\n\
    \  FROM nextrade_equity_market_data.fin.nx_ht_onl_stats_p0\n), latest_calc AS (\n  SELECT\n    dwdd,\n    mkt_id,\n  \
    \  MAX(data_calc_time) AS max_calc_time\n  FROM __nx_ht_onl_stats_p0\n  GROUP BY\n    dwdd,\n    mkt_id\n)\nSELECT\n \
    \ p0.dwdd,\n  p0.mkt_id,\n  p0.ivtr_tp_cd,\n  SUM(p0.bid_arb_trval) AS total_bid_arb_trval\nFROM __nx_ht_onl_stats_p0\
    \ AS p0\nINNER JOIN latest_calc AS lc\n  ON p0.dwdd = lc.dwdd\n  AND p0.mkt_id = lc.mkt_id\n  AND p0.data_calc_time =\
    \ lc.max_calc_time\nGROUP BY\n  p0.dwdd,\n  p0.mkt_id,\n  p0.ivtr_tp_cd\nORDER BY\n  p0.dwdd DESC NULLS LAST,\n  p0.mkt_id,\n\
    \  p0.ivtr_tp_cd\n -- Generated by Cortex Analyst (request_id: 1fbd0986-140e-4207-b0a2-548376fe1096)\n;"
  verified_at: 1775707694
