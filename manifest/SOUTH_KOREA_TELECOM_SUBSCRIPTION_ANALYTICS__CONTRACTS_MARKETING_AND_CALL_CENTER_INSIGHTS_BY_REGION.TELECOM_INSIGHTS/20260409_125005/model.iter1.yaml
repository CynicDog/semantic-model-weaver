- name: what_is_the_average_call_to_contract_conversion
  question: What is the average call-to-contract conversion rate for the '모바일' category in regions with more than 1000 contracts
    in 2023?
  sql: "WITH __v01_monthly_regional_contract_stats AS (\n  SELECT\n    install_state,\n    install_city,\n    contract_count,\n\
    \    year_month\n  FROM south_korea_telecom_subscription_analytics__contracts_marketing_and_call_center_insights_by_region.telecom_insights.v01_monthly_regional_contract_stats\n\
    ), __v11_call_to_contract_conversion AS (\n  SELECT\n    main_category_name,\n    division_name,\n    year_month,\n  \
    \  call_to_contract_cvr\n  FROM south_korea_telecom_subscription_analytics__contracts_marketing_and_call_center_insights_by_region.telecom_insights.v11_call_to_contract_conversion\n\
    ), regional_contracts_2023 AS (\n  SELECT\n    install_state,\n    install_city,\n    SUM(contract_count) AS total_contracts\n\
    \  FROM __v01_monthly_regional_contract_stats\n  WHERE\n    DATE_PART('year', year_month) = 2023\n  GROUP BY\n    install_state,\n\
    \    install_city\n  HAVING\n    SUM(contract_count) > 1000\n), qualifying_months AS (\n  SELECT DISTINCT\n    v01.year_month\n\
    \  FROM __v01_monthly_regional_contract_stats AS v01\n  INNER JOIN regional_contracts_2023 AS r\n    ON v01.install_state\
    \ = r.install_state AND v01.install_city = r.install_city\n  WHERE\n    DATE_PART('year', v01.year_month) = 2023\n), mobile_cvr\
    \ AS (\n  SELECT DISTINCT\n    v11.year_month,\n    v11.division_name,\n    v11.call_to_contract_cvr\n  FROM __v11_call_to_contract_conversion\
    \ AS v11\n  WHERE\n    v11.main_category_name = '모바일' AND DATE_PART('year', v11.year_month) = 2023\n)\nSELECT\n  AVG(mc.call_to_contract_cvr)\
    \ AS avg_call_to_contract_cvr\nFROM mobile_cvr AS mc\nINNER JOIN qualifying_months AS qm\n  ON mc.year_month = qm.year_month\n\
    \ -- Generated by Cortex Analyst (request_id: b35385cb-c207-4e21-862a-c1e535757d45)\n;"
  verified_at: 1775708156
  verified_by: weaver/v1.20260409_125005.iter1
