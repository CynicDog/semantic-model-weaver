    ), joined_data AS (\n  SELECT\n    rc.year_month,\n    cs.division_name,\n    cs.call_count,\n    cs.total_bill_second,\n\
    \    rc.contract_count\n  FROM __v01_monthly_regional_contract_stats AS rc\n  LEFT OUTER JOIN __v09_monthly_call_stats\
    \ AS cs\n    ON rc.year_month = cs.year_month\n  WHERE\n    DATE_PART('year', rc.year_month) = 2023\n)\nSELECT\n  division_name,\n\
    \  SUM(call_count) AS total_call_attempts,\n  SUM(total_bill_second) AS total_billing_seconds,\n  SUM(contract_count)\
    \ AS total_contract_count\nFROM joined_data\nGROUP BY\n  division_name\nORDER BY\n  division_name\n -- Generated by Cortex\
