    data_type: NUMBER
    description: 상담 요청 전환율 (%) = 상담요청 / 세션
  - name: CONTRACT_CVR
    expr: SUM(CONTRACT_CVR)
    data_type: NUMBER
    description: 계약 전환율 (%) = 계약 / 세션
  - name: TOTAL_REVENUE
    expr: SUM(TOTAL_REVENUE)
    data_type: NUMBER
    description: 총 매출 (원)
- name: V08_GA4_DEVICE_STATS
  description: GA4 디바이스 유형별(모바일/데스크탑/태블릿) 세션 수, 사용자 수, 전환 이벤트 집계
  base_table:
    database: SOUTH_KOREA_TELECOM_SUBSCRIPTION_ANALYTICS__CONTRACTS_MARKETING_AND_CALL_CENTER_INSIGHTS_BY_REGION
    schema: TELECOM_INSIGHTS
    table: V08_GA4_DEVICE_STATS
  primary_key:
    columns:
    - YEAR_MONTH
  dimensions:
  - name: DEVICE_CATEGORY
    expr: DEVICE_CATEGORY
    data_type: VARCHAR
    description: 디바이스 유형 (mobile, desktop, tablet)
    sample_values:
    - smart tv
    - desktop
    - mobile
    - tablet
  time_dimensions:
  - name: YEAR_MONTH
    expr: YEAR_MONTH
    data_type: DATE
    description: 집계 기준 연월 (2025-01-01 이후 데이터)
  measures:
  - name: SESSION_COUNT
    expr: SUM(SESSION_COUNT)
    data_type: NUMBER
