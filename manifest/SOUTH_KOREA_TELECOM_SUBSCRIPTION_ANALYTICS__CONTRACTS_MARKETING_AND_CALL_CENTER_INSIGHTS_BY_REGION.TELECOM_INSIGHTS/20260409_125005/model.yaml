  - name: USER_COUNT
    expr: SUM(USER_COUNT)
    data_type: NUMBER
    description: 세션 기준 순 사용자 수
  - name: CONVERSION_EVENT_COUNT
    expr: SUM(CONVERSION_EVENT_COUNT)
    data_type: NUMBER
    description: 전환 이벤트 총 수
  - name: CONVERSION_RATE
    expr: AVG(CONVERSION_RATE)
    data_type: NUMBER
    description: 전환율 (%) = 전환 이벤트 / 세션
